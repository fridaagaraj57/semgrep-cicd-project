rules:
  - id: detect-hardcoded-secret
    patterns:
      - pattern: const $SECRET = "..."
      - metavariable-regex:
          metavariable: $SECRET
          regex: .*(secret|password|passwd|key|token|jwt|api_key).*
    message: >
      Hardcoded secret detected in variable '$SECRET'.
      Secrets should never be stored in source code.
      Use environment variables or a secrets manager instead.
    languages: [javascript]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-798
      author: Frida Agaraj